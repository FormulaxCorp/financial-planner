<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migrasi Data — Financial Planner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0d0d0d; color: #f0f0f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 32px; max-width: 500px; width: 100%; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; }
    p { color: #a0a0a0; font-size: 0.9rem; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 0.85rem; color: #a0a0a0; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; background: #222; border: 1px solid #333; border-radius: 8px; color: #f0f0f0; font-size: 0.95rem; outline: none; }
    input:focus { border-color: #c0c0c0; }
    button { width: 100%; padding: 14px; background: #c0c0c0; color: #0d0d0d; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
    button:hover { background: #e0e0e0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .log { margin-top: 20px; background: #111; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.8rem; max-height: 300px; overflow-y: auto; white-space: pre-wrap; }
    .success { color: #8bc34a; }
    .error { color: #ef5350; }
    .info { color: #64b5f6; }
  </style>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="card">
    <h1>Migrasi Data</h1>
    <p>Pindahkan data dari Firestore ke Supabase. Cuma perlu sekali.</p>
    <div>
      <div class="form-group">
        <label>Email Firebase lama</label>
        <input type="email" id="fbEmail" placeholder="email">
      </div>
      <div class="form-group">
        <label>Password Firebase lama</label>
        <input type="password" id="fbPassword" placeholder="Password">
      </div>
      <button id="loginBtn">Login & Mulai Migrasi</button>
    </div>
    <div class="log" id="log"></div>
  </div>

  <script>
    var firebaseConfig = {
      apiKey: 'AIzaSyB-KenzfaQJRSZ9gB0rQpXLg9gUPxEwocI',
      authDomain: "vh-financial-planner.firebaseapp.com",
      projectId: "vh-financial-planner",
      storageBucket: "vh-financial-planner.firebasestorage.app",
      messagingSenderId: "856888624495",
      appId: "1:856888624495:web:9b4d702667a40b8775949a"
    };
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var db = firebase.firestore();
    var client = window.supabase.createClient('https://zstgiptwnqzsvgntsgtz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzdGdpcHR3bnF6c3ZnbnRzZ3R6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5MjA1MTcsImV4cCI6MjA5ODQ5NjUxN30.VXQ29HsZdWobZpgfe-sxTjlraePRzeRgRJ0XnKRezOQ');

    var logEl = document.getElementById('log');
    function log(msg, type) {
      var line = document.createElement('div');
      if (type) line.className = type;
      line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    document.getElementById('loginBtn').addEventListener('click', async function() {
      var btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Processing...';
      logEl.innerHTML = '';
      try {
        var email = document.getElementById('fbEmail').value.trim();
        var password = document.getElementById('fbPassword').value;
        if (!email || !password) { log('Masukkan email dan password!', 'error'); btn.disabled = false; btn.textContent = 'Login & Mulai Migrasi'; return; }

        log('Login ke Firebase...', 'info');
        var cred = await auth.signInWithEmailAndPassword(email, password);
        log('Login berhasil!', 'success');

        log('Ambil data dari Firestore...', 'info');
        var snap = await db.collection('users').doc(cred.user.uid).collection('data').get();
        var items = [];
        snap.forEach(function(doc) { items.push({id: doc.id, data: doc.data()}); });
        log('Ditemukan ' + items.length + ' dokumen', 'success');

        if (items.length === 0) { log('Data kosong!', 'error'); btn.disabled = false; btn.textContent = 'Login & Mulai Migrasi'; return; }

        log('Kirim ke Supabase...', 'info');
        for (var i = 0; i < items.length; i++) {
          var item = items[i];
          var res = await client.from('app_data').upsert({ id: item.id, data: item.data, updated_at: new Date().toISOString() });
          if (res.error) { log('Gagal ' + item.id + ': ' + res.error.message, 'error'); }
          else { log('Berhasil: ' + item.id, 'success'); }
        }

        log('', '');
        log('MIGRASI SELESAI!', 'success');
        log('Buka https://vh-financial-planner.netlify.app', 'info');
      } catch(e) {
        log('ERROR: ' + e.message, 'error');
        console.error(e);
      }
      btn.disabled = false;
      btn.textContent = 'Login & Mulai Migrasi';
    });
  </script>
</body>
</html>
